# 告示第十第一号カテゴリ × 薬価基準成分名 対応表（aliasテーブル）
#
# ■ 目的
#   告示の「カテゴリ名」と薬価基準の「成分名」が一致しないケースをここで橋渡しする。
#   例: 告示「ヒト成長ホルモン剤」⇔ 薬価基準「ソマトロピン」
#
# ■ 記入ルール
#   - カテゴリ名（告示原文ママ） をキーに、該当する成分名のリストを列挙
#   - 成分名は薬価基準の「成分名」列と完全一致させること（ルビ文字や全角スペースに注意）
#   - 確信が持てない成分は絶対に書かない（空のままにする）。ここに書いた＝院外処方可能として扱われる
#   - 条件付きカテゴリ（例: エリスロポエチンは在宅血液透析のみ）の条件は告示側に持たせてあるのでここでは気にしない
#
# ■ レビュー優先順位
#   1. yakkaに実在する成分名のみ記載する（存在しない名称を書かない）
#   2. 疑義があれば PMDA 添付文書検索（https://www.pmda.go.jp/）で薬効分類を確認
#   3. 削除は要注意。消すとその成分の院外処方可否が × に変わる
#
# ■ 更新者ログ（任意）
#   - 記入日 / 記入者 / 参考資料 を対象成分のコメントで残してください

