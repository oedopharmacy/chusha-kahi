# 告示第十第一号カテゴリ別 拡張マッチングルール
#
# 単純な「カテゴリ名 substring マッチ」では漏れる成分を補完する。
#   yj4_codes:    薬価基準収載医薬品コード先頭4桁の列（いずれかに一致で該当扱い）
#   ingredients:  成分名の完全一致または部分一致列（substring）
#
# 出典:
#   告示107号 第十 第一号（令和8年2月1日適用版）原文
#   薬価基準収載品目リスト（注射薬）令和8年4月15日適用版のYJコード分布
#   関連通知「疑義解釈資料」(保医発)
#
# 備考:
#   単純な category 名 substring で既にヒットする成分はここに列挙しなくてよい。
#   ここに書くのは「成分名に category 名語幹が現れない」ケースに限る。

# ---------- 広域カテゴリ（YJ4コード一括）----------
抗悪性腫瘍剤:
  yj4_codes: [4211, 4212, 4213, 4219, 4222, 4223, 4224, 4229, 4231, 4233, 4234, 4235, 4239, 4240, 4291, 4299]

注射用抗菌薬:
  # 抗菌薬限定（抗ウイルス剤6250・抗真菌剤6290・トリコマイシン6222 は除外）
  # 告示で抗ウイルス剤・抗真菌剤は個別に列挙されているため、包括マッチは抗菌薬のみ
  yj4_codes: [6111, 6112, 6113, 6119, 6122, 6123, 6124, 6125, 6129, 6131, 6132, 6133, 6134, 6135, 6139, 6141, 6149, 6151, 6152, 6161, 6169, 6173, 6179, 6191, 6241, 6249]

電解質製剤:
  # 電解質補正剤 YJ3319（KCl、NaCl補正液、乳酸リンゲル等）
  # 糖・電解質輸液 YJ3331（ブドウ糖加リンゲル等）、維持液等も含める
  yj4_codes: [3319, 3331]

在宅中心静脈栄養法用輸液:
  # 高カロリー輸液基本液 YJ3239、アミノ酸輸液 YJ3249、TPN配合剤 YJ3259、
  # 肝不全用アミノ酸 YJ3253（在宅TPNで使用あり）
  yj4_codes: [3239, 3249, 3253, 3259]
  ingredients:
    - 高カロリー輸液用基本液
    - 総合アミノ酸製剤
    - 肝不全用アミノ酸製剤
    - アミノ酸・糖・電解質
    - アミノ酸・糖・脂肪・電解質
    - アミノ酸・糖・電解質・ビタミン
    - アミノ酸・糖・電解質・総合ビタミン
    - アミノ酸・糖・電解質・脂肪・ビタミン

自己連続携行式腹膜灌流用灌流液:
  yj4_codes: [3420]
  ingredients:
    - 腹膜透析液

人工腎臓用透析液:  # 条件: 在宅血液透析患者のみ
  yj4_codes: [3410]
  ingredients:
    - 人工透析液

脂肪乳剤:
  yj4_codes: [3299]
  ingredients:
    - ダイズ油
    - 精製大豆油

# ---------- 薬効分類名型（明示的成分リスト）----------
プロトンポンプ阻害剤:
  ingredients:
    - オメプラゾールナトリウム
    - オメプラゾール
    - ランソプラゾール
    - エソメプラゾールナトリウム水和物
    - ラベプラゾールナトリウム
    - パントプラゾールナトリウム
    - ボノプラザンフマル酸塩

H2遮断剤:
  yj4_codes: [2325]
  ingredients:
    - シメチジン
    - ファモチジン
    - ラニチジン塩酸塩
    - ロキサチジン酢酸エステル塩酸塩
    - ラフチジン
    - ニザチジン

血液凝固阻止剤:  # 条件: 在宅血液透析患者のみ
  yj4_codes: [3334]
  ingredients:
    - ヘパリンナトリウム
    - エノキサパリンナトリウム
    - ダルテパリンナトリウム
    - パルナパリンナトリウム
    - フォンダパリヌクスナトリウム

生理食塩水:  # 条件: 在宅血液透析 or 他注射薬の溶解・希釈用
  ingredients:
    - 生理食塩液

注射用水:  # 条件: 他注射薬の溶解・希釈用
  ingredients:
    - 注射用水

抗悪性腫瘍剤の派生 - 免疫チェックポイント等:
  # 抗悪性腫瘍剤 4291 に含まれる免疫チェックポイント阻害薬・分子標的薬も既にyj4_codesで捕捉済
  ingredients: []
