<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>大江戸注射</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="./favicon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<meta name="theme-color" content="#595959">
<style>
  :root { --bg:#f8f9fb; --card:#fff; --border:#e2e5ec; --text:#222; --muted:#666; --ok:#22a06b; --ng:#c73757; --warn:#d17a00; --check:#b5880f; --del:#888; --header:#3a3a3a; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif; margin:0; background:var(--bg); color:var(--text); }
  header { padding: 12px 16px 10px; background: var(--header); color:#fff; border-bottom:1px solid #2a2a2a; position:sticky; top:0; z-index:10; display:flex; align-items:center; gap:12px; }
  header .logo { width:46px; height:46px; flex-shrink:0; }
  header .title-block { display:flex; flex-direction:column; min-width:0; }
  header h1 { font-size: 18px; margin:0 0 4px; color:#fff; letter-spacing: 0.02em; }
  .meta { font-size: 11px; color: #c8c8c8; }
  .search-wrap { padding: 12px 20px 14px; background:var(--card); border-bottom: 1px solid var(--border); position:sticky; top:52px; z-index:9; }
  #q { width:100%; padding:10px 12px; font-size:16px; border:1px solid var(--border); border-radius:8px; outline:none; }
  #q:focus { border-color:#4b7bec; }
  .filters { margin-top:8px; display:flex; gap:8px; font-size:12px; flex-wrap:wrap; }
  .filters label { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border:1px solid var(--border); border-radius:999px; background:#fff; cursor:pointer; }
  .filters input { margin: 0; }
  #results { padding: 10px 12px 60px; }
  .hit-count { font-size: 11px; color: var(--muted); margin: 6px 8px 8px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin:8px 0; }
  .row-top { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .name { font-weight:600; font-size:15px; }
  .badge { font-size:12px; font-weight:700; padding:2px 10px; border-radius:12px; }
  .badge.ok { background:#e6f7ef; color:var(--ok); }
  .badge.check { background:#fff4d1; color:var(--check); border:1px solid #e8ce68; }
  .badge.ng { background:#fbe9ee; color:var(--ng); }
  .badge.del { background:#eee; color:var(--del); }
  .row-sub { color:var(--muted); font-size:12px; margin-top:4px; }
  .row-kikaku { font-size:13px; margin-top:2px; }
  .reason { font-size:11px; color:var(--muted); margin-top:6px; border-top:1px dashed var(--border); padding-top:6px; }
  .haishi { color:var(--warn); font-size:11px; margin-top:4px; }
  details.detail { margin-top:8px; border-top:1px dashed var(--border); padding-top:6px; font-size:12px; }
  details.detail > summary { cursor:pointer; color:#4b7bec; font-size:11px; user-select:none; }
  details.detail > summary:hover { text-decoration:underline; }
  .why-box, .how-box, .src-box, .cv-box { margin-top:8px; padding:8px 10px; border-radius:6px; font-size:12px; line-height:1.55; }
  .why-box { background:#eef5ff; border:1px solid #bed6f7; }
  .how-box { background:#fff4d1; border:1px solid #e8ce68; }
  ul.bullets { margin:4px 0 0; padding-left:18px; }
  ul.bullets li { margin:3px 0; line-height:1.55; }
  .src-box { background:#f5f5f5; border:1px solid var(--border); font-family:ui-monospace,monospace; font-size:11px; white-space:pre-wrap; }
  .cv-box { background:#fafafa; border:1px solid var(--border); font-size:11px; }
  .cv-row { display:flex; gap:8px; align-items:center; padding:2px 0; }
  .cv-name { width:60px; font-weight:600; color:#555; font-size:10px; }
  .cv-verdict { padding:1px 6px; border-radius:8px; font-weight:700; font-size:10px; }
  .cv-verdict.v\_o { background:#e6f7ef; color:var(--ok); }
  .cv-verdict.v\_t { background:#fff4d1; color:var(--check); }
  .cv-verdict.v\_x { background:#fbe9ee; color:var(--ng); }
  .cv-verdict.v\_d { background:#eee; color:#888; }
  .box-label { font-weight:600; font-size:10px; color:#666; margin-bottom:3px; text-transform:none; letter-spacing:0.03em; }
  footer { border-top:1px solid var(--border); padding:14px 20px; background:var(--card); font-size:11px; color:var(--muted); }
  mark { background: #fff3a3; padding: 0 2px; }
</style>
</head>
<body>

<header>
  <img src="./logo-160.png" alt="大江戸代田薬局" class="logo">
  <div class="title-block">
    <h1>大江戸注射検索</h1>
    <div class="meta" id="meta">loading…</div>
  </div>
</header>

<div class="search-wrap">
  <input id="q" type="search" autocomplete="off" autofocus placeholder="販売名・成分名・YJコードで検索（例: ヒューマリン／インスリン／ソマトロピン）">
  <div class="filters">
    <label><input type="checkbox" id="f_ok" checked> ○ 院外可</label>
    <label><input type="checkbox" id="f_check" checked> △ 要確認</label>
    <label><input type="checkbox" id="f_ng" checked> × 院内のみ</label>
    <label><input type="checkbox" id="f_del" checked> － 削除品目</label>
    <label><input type="checkbox" id="f_haishi"> 廃止予定のみ</label>
  </div>
</div>

<div class="hit-count" id="hit"></div>
<div id="results"></div>

<footer>
  出典: 薬価基準収載品目リスト（厚労省, 令和8年4月15日適用）／<br>
  平成18年厚労省告示第107号 第十 第一号（令和8年2月1日改正）<br>
  本ツールは医療機関向け検索補助として試験運用中。返戻責任は利用者に帰属します。
</footer>

<script>
let DATA = [];
let META = {};

async function load() {
  const [dataRes, metaRes] = await Promise.all([
    fetch('./data.json'),
    fetch('./meta.json')
  ]);
  DATA = await dataRes.json();
  META = await metaRes.json();
  // 検索用正規化文字列を事前計算（起動時1回のみ）
  for (const r of DATA) {
    r._hay = normText(r.n + '\t' + r.s + '\t' + r.y + '\t' + r.m);
  }
  const s = META.stats || {};
  const line1 = `収載${META.total}品目（院外可${s['○']||0} 院外不可${s['×']||0} 要確認${s['△']||0}）`;
  const line2 = META.last_updated ? `最終更新日 ${META.last_updated}` : '';
  document.getElementById('meta').innerHTML =
    escapeHtml(line1) + (line2 ? '<br>' + escapeHtml(line2) : '');
  render();
}

const q = document.getElementById('q');
const f_ok = document.getElementById('f_ok');
const f_check = document.getElementById('f_check');
const f_ng = document.getElementById('f_ng');
const f_del = document.getElementById('f_del');
const f_haishi = document.getElementById('f_haishi');

// ひらがな→カタカナ（U+3041–U+3096 → +0x60）
function hiraToKata(s) {
  return s.replace(/[\u3041-\u3096]/g, ch =>
    String.fromCharCode(ch.charCodeAt(0) + 0x60));
}

// 半角カナ→全角カナ（濁点・半濁点含む）
const _HALF_KANA_MAP = {
  'ｶﾞ':'ガ','ｷﾞ':'ギ','ｸﾞ':'グ','ｹﾞ':'ゲ','ｺﾞ':'ゴ',
  'ｻﾞ':'ザ','ｼﾞ':'ジ','ｽﾞ':'ズ','ｾﾞ':'ゼ','ｿﾞ':'ゾ',
  'ﾀﾞ':'ダ','ﾁﾞ':'ヂ','ﾂﾞ':'ヅ','ﾃﾞ':'デ','ﾄﾞ':'ド',
  'ﾊﾞ':'バ','ﾋﾞ':'ビ','ﾌﾞ':'ブ','ﾍﾞ':'ベ','ﾎﾞ':'ボ',
  'ﾊﾟ':'パ','ﾋﾟ':'ピ','ﾌﾟ':'プ','ﾍﾟ':'ペ','ﾎﾟ':'ポ','ｳﾞ':'ヴ',
  'ｱ':'ア','ｲ':'イ','ｳ':'ウ','ｴ':'エ','ｵ':'オ',
  'ｶ':'カ','ｷ':'キ','ｸ':'ク','ｹ':'ケ','ｺ':'コ',
  'ｻ':'サ','ｼ':'シ','ｽ':'ス','ｾ':'セ','ｿ':'ソ',
  'ﾀ':'タ','ﾁ':'チ','ﾂ':'ツ','ﾃ':'テ','ﾄ':'ト',
  'ﾅ':'ナ','ﾆ':'ニ','ﾇ':'ヌ','ﾈ':'ネ','ﾉ':'ノ',
  'ﾊ':'ハ','ﾋ':'ヒ','ﾌ':'フ','ﾍ':'ヘ','ﾎ':'ホ',
  'ﾏ':'マ','ﾐ':'ミ','ﾑ':'ム','ﾒ':'メ','ﾓ':'モ',
  'ﾔ':'ヤ','ﾕ':'ユ','ﾖ':'ヨ',
  'ﾗ':'ラ','ﾘ':'リ','ﾙ':'ル','ﾚ':'レ','ﾛ':'ロ',
  'ﾜ':'ワ','ｦ':'ヲ','ﾝ':'ン',
  'ｧ':'ァ','ｨ':'ィ','ｩ':'ゥ','ｪ':'ェ','ｫ':'ォ',
  'ｬ':'ャ','ｭ':'ュ','ｮ':'ョ','ｯ':'ッ',
  'ｰ':'ー','｡':'。','､':'、','｢':'「','｣':'」','･':'・'
};
const _HALF_KANA_RE = new RegExp(Object.keys(_HALF_KANA_MAP).sort((a,b)=>b.length-a.length).join('|'),'g');
function halfToFullKana(s) {
  return s.replace(_HALF_KANA_RE, ch => _HALF_KANA_MAP[ch]);
}

// 検索・被検索双方に適用する正規化
function normText(s) {
  if (!s) return '';
  s = halfToFullKana(s);
  s = hiraToKata(s);
  s = s.toLowerCase();
  // 全角英数→半角
  s = s.replace(/[Ａ-Ｚａ-ｚ０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0)-0xFEE0));
  // 空白・中黒・長音の揺れ除去
  s = s.replace(/[\s　・]/g, '');
  return s;
}
function normQuery(s) { return normText((s||'').trim()); }

function highlight(text, queryRaw) {
  if (!queryRaw) return escapeHtml(text);
  // Simple: just return escaped text; highlight by substring in normalized space is complex
  return escapeHtml(text);
}
function escapeHtml(s) { return (s||'').replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function badge(g) {
  if (g === '○') return '<span class="badge ok">○ 院外可</span>';
  if (g === '△') return '<span class="badge check">△ 要確認</span>';
  if (g === '×') return '<span class="badge ng">× 院内のみ</span>';
  return '<span class="badge del">－ 削除</span>';
}
function verdictClass(v) {
  if (v === '○') return 'v_o';
  if (v === '△') return 'v_t';
  if (v === '×') return 'v_x';
  return 'v_d';
}
function confLabel(c) {
  if (c === 'high') return '一致(高)';
  if (c === 'medium') return '多数派';
  if (c === 'low') return '相違あり';
  return '?';
}

function render() {
  const qn = normQuery(q.value);
  let results = DATA.filter(r => {
    if (r.g === '○' && !f_ok.checked) return false;
    if (r.g === '△' && !f_check.checked) return false;
    if (r.g === '×' && !f_ng.checked) return false;
    if (r.g === '－' && !f_del.checked) return false;
    if (f_haishi.checked && !r.x) return false;
    if (qn && !r._hay.includes(qn)) return false;
    return true;
  });
  const LIMIT = 200;
  const truncated = results.length > LIMIT;
  const shown = results.slice(0, LIMIT);
  document.getElementById('hit').textContent =
    truncated ? `${results.length}件ヒット（先頭${LIMIT}件を表示）` : `${results.length}件`;

  const root = document.getElementById('results');
  root.innerHTML = shown.map(r => {
    // 判定理由（複数AIの内容を箇条書きにまとめ）
    const reasons = [];
    if (r.why_g) reasons.push(r.why_g);
    if (r.why_p && r.why_p !== r.why_g) reasons.push(r.why_p);
    // 処方方法（条件付/△品目向け）
    const methods = [];
    if (r.how_g) methods.push(r.how_g);
    if (r.how_p && r.how_p !== r.how_g) methods.push(r.how_p);
    const hasDetail = reasons.length > 0 || methods.length > 0 || r.src;
    return `
    <div class="card">
      <div class="row-top">
        <span class="name">${escapeHtml(r.n)}</span>
        ${badge(r.g)}
      </div>
      <div class="row-sub">${escapeHtml(r.s)} ／ ${escapeHtml(r.m)} ／ YJ: ${escapeHtml(r.y)}</div>
      <div class="row-kikaku">規格: ${escapeHtml(r.k)}  /  薬価: ${escapeHtml(r.p)}</div>
      ${r.x ? `<div class="haishi">⚠ ${escapeHtml(r.x)}: ${escapeHtml(r.d)}</div>` : ''}
      <div class="reason">判定根拠: ${escapeHtml(r.r)}</div>
      ${hasDetail ? `
        <details class="detail">
          <summary>詳細を表示（判定理由／処方方法／告示原文）</summary>
          ${reasons.length > 0 ? `<div class="why-box"><div class="box-label">判定理由</div><ul class="bullets">${reasons.map(t => `<li>${escapeHtml(t)}</li>`).join('')}</ul></div>` : ''}
          ${methods.length > 0 ? `<div class="how-box"><div class="box-label">条件付きで可能な処方方法</div><ul class="bullets">${methods.map(t => `<li>${escapeHtml(t)}</li>`).join('')}</ul></div>` : ''}
          ${r.src ? `<div class="src-box"><div class="box-label">告示原文（該当部分）</div>${escapeHtml(r.src)}</div>` : ''}
        </details>
      ` : ''}
    </div>
  `;}).join('');
  if (results.length === 0) root.innerHTML = '<div class="hit-count">該当なし</div>';
}

q.addEventListener('input', render);
[f_ok, f_check, f_ng, f_del, f_haishi].forEach(el => el.addEventListener('change', render));
load();
</script>
</body>
</html>
