# 告示第十第一号カテゴリ別 拡張マッチングルール
#
# 単純な「カテゴリ名 substring マッチ」では漏れる成分を補完する。
#   yj4_codes:    薬価基準収載医薬品コード先頭4桁の列（いずれかに一致で該当扱い）
#   ingredients:  成分名の完全一致または部分一致列（substring）
#
# 出典:
#   告示107号 第十 第一号（令和8年2月1日適用版）原文
#   薬価基準収載品目リスト（注射薬）令和8年4月15日適用版のYJコード分布
#   関連通知「疑義解釈資料」(保医発)
#
# 備考:
#   単純な category 名 substring で既にヒットする成分はここに列挙しなくてよい。
#   ここに書くのは「成分名に category 名語幹が現れない」ケースに限る。

# ---------- 広域カテゴリ（YJ4コード一括）----------
抗悪性腫瘍剤:
  yj4_codes: [4211, 4212, 4213, 4219, 4222, 4223, 4224, 4229, 4231, 4233, 4234, 4235, 4239, 4240, 4291, 4299]

注射用抗菌薬:
  # 抗菌薬限定（抗ウイルス剤6250・抗真菌剤6290・トリコマイシン6222 は除外）
  # 告示で抗ウイルス剤・抗真菌剤は個別に列挙されているため、包括マッチは抗菌薬のみ
  yj4_codes: [6111, 6112, 6113, 6119, 6122, 6123, 6124, 6125, 6129, 6131, 6132, 6133, 6134, 6135, 6139, 6141, 6149, 6151, 6152, 6161, 6169, 6173, 6179, 6191, 6241, 6249]

電解質製剤:
  # 電解質補正剤 YJ3319（KCl、NaCl補正液、乳酸リンゲル等）
  # 糖・電解質輸液 YJ3331（ブドウ糖加リンゲル等）、維持液等も含める
  # その他電解質補正 YJ3229（K.C.L点滴液、アスパラK、亜鉛・マンガン補正等）
  # 告示は無条件記載のため YJ4 マッチでも ○ 判定（specific 扱い）
  yj4_codes: [3229, 3319, 3331]
  match_level: specific

在宅中心静脈栄養法用輸液:
  # 高カロリー輸液基本液 YJ3239、アミノ酸輸液 YJ3249、肝不全・腎不全用AA YJ3253（在宅TPNで使用あり）
  # 注: YJ3259 (アミノ酸・糖・電解質配合剤) はプラセンタ製剤等の非TPN品目を含むため除外。
  #     真のTPN配合剤は下記 ingredients で明示マッチ。
  yj4_codes: [3239, 3249, 3253]
  ingredients:
    - 高カロリー輸液用基本液
    - 総合アミノ酸製剤
    - 肝不全用アミノ酸製剤
    - 腎不全用アミノ酸製剤
    - アミノ酸・糖・電解質
    - アミノ酸・糖・脂肪・電解質
    - アミノ酸・糖・電解質・ビタミン
    - アミノ酸・糖・電解質・総合ビタミン製剤
    - アミノ酸・糖・電解質・脂肪・ビタミン

自己連続携行式腹膜灌流用灌流液:
  yj4_codes: [3420]
  ingredients:
    - 腹膜透析液

人工腎臓用透析液:  # 条件: 在宅血液透析患者のみ
  yj4_codes: [3410]
  ingredients:
    - 人工透析液

脂肪乳剤:
  yj4_codes: [3299]
  match_level: specific
  ingredients:
    - ダイズ油
    - 精製大豆油

# ---------- 限定条件付きカテゴリで「通常用法は条件適合」とみなすもの ----------
オマリズマブ製剤:
  # 告示条件「季節性アレ鼻炎用途を除く」は narrow な exclusion。
  # 通常承認適応（喘息、慢性蕁麻疹等）は条件適合 → ○ 扱い
  match_level: specific

ベンラリズマブ製剤:
  # 告示条件「4週間を超える間隔の場合除く」。承認用法は4週/8週なので通常満たす
  match_level: specific

ビメキズマブ製剤:
  # 告示条件「4週間を超える間隔の場合除く」。承認用法はほぼ満たす
  match_level: specific

フレマネズマブ製剤:
  # 告示条件「4週に1回投与の場合に限る」。承認用法のひとつ
  match_level: specific

# ---------- 薬効分類名型（明示的成分リスト）----------
プロトンポンプ阻害剤:
  ingredients:
    - オメプラゾールナトリウム
    - オメプラゾール
    - ランソプラゾール
    - エソメプラゾールナトリウム水和物
    - ラベプラゾールナトリウム
    - パントプラゾールナトリウム
    - ボノプラザンフマル酸塩

H2遮断剤:
  yj4_codes: [2325]
  ingredients:
    - シメチジン
    - ファモチジン
    - ラニチジン塩酸塩
    - ロキサチジン酢酸エステル塩酸塩
    - ラフチジン
    - ニザチジン

血液凝固阻止剤:  # 告示条件: 在宅血液透析患者のみ
  # 注: ヘパリンナトリウムは 在宅中心静脈栄養（TPN）でのカテーテル管理（ロック）用途として
  #     臨床現場で広く使用されており、在宅医療実態として院外処方される。
  #     告示の strict 解釈では「在宅血液透析患者」だが、関連する在宅医療管理料の対象
  #     患者では実態として院外処方箋による交付が行われている。
  yj4_codes: [3334]
  ingredients:
    - エノキサパリンナトリウム
    - ダルテパリンナトリウム
    - パルナパリンナトリウム
    - フォンダパリヌクスナトリウム

生理食塩水:
  # 告示条件: 「在宅血液透析患者に対して使用する場合及び本号に掲げる注射薬を
  # 投与するに当たりその溶解又は希釈に用いる場合に限る」
  # → 在宅医療で告示記載の注射薬を投与する際の溶解・希釈用途は普遍的に該当するため、
  # 在宅医療現場では実質的に無条件 ○ として運用される。
  match_level: specific
  ingredients:
    - 生理食塩液

注射用水:
  # 告示条件: 「本号に掲げる注射薬を投与するに当たりその溶解又は希釈に用いる場合に限る」
  # → 在宅医療で告示記載の注射薬を投与する際の溶解・希釈用途は普遍的に該当するため、
  # 実質的に無条件 ○ として運用される。
  match_level: specific
  ingredients:
    - 注射用水

抗悪性腫瘍剤の派生 - 免疫チェックポイント等:
  # 抗悪性腫瘍剤 4291 に含まれる免疫チェックポイント阻害薬・分子標的薬も既にyj4_codesで捕捉済
  ingredients: []
